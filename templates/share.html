<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <meta property="og:title" content="{{ title }}">
    <meta property="og:type" content="video.other">
    <meta property="og:video" content="{{ video_url }}">
    <meta property="og:video:url" content="{{ video_url }}">
    <meta property="og:video:type" content="video/mp4">
    {% if thumbnail %}
    <meta property="og:image" content="{{ thumbnail }}">
    {% endif %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400&family=Syne:wght@400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d0d0d; --border: #2a2a2a; --text: #e8e8e8; --muted: #555; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        video { max-width: 100%; max-height: 80vh; border-radius: 8px; }
        a { color: var(--muted); font-size: 0.72rem; margin-top: 16px; text-decoration: none; }
        a:hover { color: var(--text); }
    </style>
</head>
<body>
    {% if is_audio %}
    <audio controls src="{{ video_url }}"></audio>
    {% else %}
    <video controls playsinline src="{{ video_url }}"></video>
    {% endif %}
    <a href="/">← downloader.wubly.run</a>
</body>
</html>
